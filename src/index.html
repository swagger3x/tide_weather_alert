<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tide & Weather Alert — Update Email</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a1628;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      background: #111f38;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    h1 {
      color: #e8f4fd;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: #5b8db8;
      font-size: 13px;
      margin-top: 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e3a5f;
      margin: 24px 0;
    }

    label {
      display: block;
      color: #7eadd4;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #0a1628;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e8f4fd;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus {
      border-color: #2e75b6;
    }

    input::placeholder {
      color: #2e4a6b;
    }

    button {
      width: 100%;
      background: #2e75b6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover { background: #1f5a99; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #1e3a5f; color: #3a6a99; cursor: not-allowed; }

    .result {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .result.success {
      background: #0d2e1a;
      border: 1px solid #1a5c34;
      color: #4caf7d;
      display: block;
    }

    .result.error {
      background: #2e0d0d;
      border: 1px solid #5c1a1a;
      color: #e07070;
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: #2e4a6b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="icon">🌊</span>
      <h1>Tide & Weather Alert</h1>
      <p class="subtitle">Update your notification email address</p>
    </div>

    <hr class="divider">

    <form id="updateForm" onsubmit="handleSubmit(event)">
      <label for="email">New email address</label>
      <input
        type="email"
        id="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
      />

      <label for="token">Secret token</label>
      <input
        type="password"
        id="token"
        placeholder="Enter your secret token"
        required
      />

      <button type="submit" id="submitBtn">Update email</button>
    </form>

    <div class="result" id="result"></div>

    <div class="footer">
      Tide & Weather Alert Tool
    </div>
  </div>

  <script>
    // Replace this with your actual Lambda Function URL
    const LAMBDA_URL = "https://m4mhofljcwdv6wozejqbzlixsu0yjajq.lambda-url.eu-north-1.on.aws/";

    async function handleSubmit(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const token = document.getElementById("token").value.trim();
      const btn = document.getElementById("submitBtn");
      const result = document.getElementById("result");

      btn.disabled = true;
      btn.textContent = "Updating...";
      result.className = "result";
      result.style.display = "none";

      try {
        const response = await fetch(LAMBDA_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "update_email", token, email }),
        });

        const data = await response.json();

        if (response.ok) {
          result.className = "result success";
          result.textContent = `✅ Email updated to ${email}`;
        } else {
          result.className = "result error";
          result.textContent = `❌ ${data.body || "Something went wrong. Check your token and try again."}`;
        }
      } catch (err) {
        result.className = "result error";
        result.textContent = "❌ Could not reach the server. Please try again.";
      }

      btn.disabled = false;
      btn.textContent = "Update email";
    }
  </script>
</body>
</html>
